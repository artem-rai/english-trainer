<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">

    <!-- Background -->
    <rect x="6" y="6" width="116" height="116" rx="22" fill="#ffffff" stroke="#1F4A8A" stroke-width="4"></rect>

    <!-- Speech bubble -->
    <circle cx="64" cy="34" r="20" fill="#ffffff" stroke="#1F4A8A" stroke-width="3"></circle>

    <path d="M60 50 L66 58 L70 48" fill="#ffffff" stroke="#1F4A8A" stroke-width="3" stroke-linejoin="round"></path>

    <!-- UK flag -->
    <clipPath id="flagClip">
        <circle cx="64" cy="34" r="17"></circle>
    </clipPath>

    <g clip-path="url(#flagClip)">
        <rect x="47" y="17" width="34" height="34" fill="#1F4A8A"></rect>

        <path d="M47 17 L81 51
               M81 17 L47 51" stroke="#ffffff" stroke-width="7"></path>

        <path d="M47 17 L81 51
               M81 17 L47 51" stroke="#D62828" stroke-width="3"></path>

        <rect x="60" y="17" width="8" height="34" fill="#ffffff"></rect>

        <rect x="47" y="30" width="34" height="8" fill="#ffffff"></rect>

        <rect x="61.5" y="17" width="5" height="34" fill="#D62828"></rect>

        <rect x="47" y="31.5" width="34" height="5" fill="#D62828"></rect>
    </g>

    <!-- Book -->
    <path d="
            M34 55
            Q49 49 64 55
            Q79 49 94 55
            L94 92
            Q79 86 64 92
            Q49 86 34 92
            Z" fill="#F8F9FB" stroke="#1F4A8A" stroke-width="3"></path>

    <!-- Center fold -->
    <line x1="64" y1="55" x2="64" y2="92" stroke="#1F4A8A" stroke-width="2"></line>

    <!-- Pages -->
    <path d="M40 61 Q50 58 60 62" stroke="#C9D3E6" stroke-width="2" fill="none"></path>

    <path d="M68 62 Q78 58 88 61" stroke="#C9D3E6" stroke-width="2" fill="none"></path>

</svg>